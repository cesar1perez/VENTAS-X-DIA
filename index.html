<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Comercial</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f3f4f6;
}

header{
    background:#111827;
    color:white;
    padding:20px;
}

.container{
    padding:20px;
}

.filters{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:25px;
}

select{
    padding:12px;
    border-radius:10px;
    border:1px solid #d1d5db;
    background:white;
}

.kpis{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:white;
    border-radius:16px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.card h3{
    margin:0;
    color:#6b7280;
}

.card p{
    font-size:28px;
    margin-top:10px;
    font-weight:bold;
}

.section{
    background:white;
    border-radius:16px;
    padding:20px;
    margin-top:25px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.calendar-header{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
    margin-bottom:10px;
}

.calendar-header div{
    text-align:center;
    font-weight:bold;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
}

.day{
    background:white;
    border-radius:14px;
    padding:10px;
    min-height:150px;
    cursor:pointer;
    border-left:6px solid #10b981;
    box-shadow:0 2px 6px rgba(0,0,0,.08);
}

.day:hover{
    transform:scale(1.02);
}

.red{
    border-left-color:#ef4444;
}

.yellow{
    border-left-color:#f59e0b;
}

.green{
    border-left-color:#10b981;
}

.day-number{
    font-size:20px;
    font-weight:bold;
}

.day-name{
    font-size:12px;
    color:#6b7280;
    margin-bottom:8px;
}

.day-data{
    font-size:12px;
    margin-top:5px;
}

.empty{
    background:transparent;
    box-shadow:none;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#111827;
    color:white;
    padding:12px;
    font-size:13px;
}

td{
    padding:10px;
    border-bottom:1px solid #e5e7eb;
    font-size:13px;
}

tr:hover{
    background:#f9fafb;
}

</style>

</head>

<body>

<header>
<h1>Dashboard Comercial Mayo 2026</h1>
</header>

<div class="container">

<div class="filters">

<select id="vendedorFilter">
<option value="">Todos los vendedores</option>
</select>

<select id="clienteFilter">
<option value="">Todos los clientes</option>
</select>

<select id="clasificacionFilter">
<option value="">Todas las clasificaciones</option>
</select>

</div>

<div class="kpis">

<div class="card">
<h3>FACTURACIÓN</h3>
<p id="facturacion">$0</p>
</div>

<div class="card">
<h3>COSTO</h3>
<p id="costo">$0</p>
</div>

<div class="card">
<h3>UTILIDAD</h3>
<p id="utilidad">$0</p>
</div>

<div class="card">
<h3>ARTÍCULOS</h3>
<p id="cantidad">0</p>
</div>

<div class="card">
<h3>CLIENTES</h3>
<p id="clientes">0</p>
</div>

<div class="card">
<h3>MARGEN</h3>
<p id="margen">0%</p>
</div>

</div>

<div class="section">

<h2>Calendario Mayo 2026</h2>

<div class="calendar-header">

<div>Lunes</div>
<div>Martes</div>
<div>Miércoles</div>
<div>Jueves</div>
<div>Viernes</div>
<div>Sábado</div>
<div>Domingo</div>

</div>

<div class="calendar" id="calendar"></div>

</div>

<div class="section">

<h2>Detalle de Ventas</h2>

<table>

<thead>

<tr>
<th>Fecha</th>
<th>Día</th>
<th>Vendedor</th>
<th>Cliente</th>
<th>Artículo</th>
<th>Clasificación</th>
<th>Cantidad</th>
<th>Importe</th>
<th>Costo</th>
<th>Utilidad</th>
</tr>

</thead>

<tbody id="tablaVentas"></tbody>

</table>

</div>

</div>

<script>

const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRDY9ek9N_ePgcaLznpzxUj8aZfJvWsbmjDMdC972iN8OVsxIz-cNLM0rpmLPyD2OztamjBYoZKSUUf/pub?output=csv";

let ventas = [];

const dias = [
'Domingo',
'Lunes',
'Martes',
'Miércoles',
'Jueves',
'Viernes',
'Sábado'
];

function limpiarNumero(valor){

    if(!valor) return 0;

    valor = valor.toString();

    valor = valor.replace(/"/g,'');

    valor = valor.replace(/\$/g,'');

    valor = valor.replace(/,/g,'');

    valor = valor.trim();

    return Number(valor) || 0;
}

function convertirFecha(fecha){

    if(!fecha) return null;

    let partes = fecha.split('/');

    if(partes.length != 3)
        return null;

    return new Date(
        partes[2],
        partes[1]-1,
        partes[0]
    );
}

function cargarDatos(){

    Papa.parse(csvUrl,{

        download:true,

        header:true,

        skipEmptyLines:true,

        dynamicTyping:false,

        quoteChar:'"',

        complete:function(results){

            ventas = results.data.map(v=>{

                let fecha =
                    convertirFecha(v.FECHA);

                if(!fecha)
                    return null;

                let importe =
                    limpiarNumero(v.IMPORTE);

                let costo =
                    limpiarNumero(v.COSTO);

                let cantidad =
                    limpiarNumero(v.CANTIDAD);

                return{

                    ...v,

                    fechaObj:fecha,

                    IMPORTE:importe,

                    COSTO:costo,

                    CANTIDAD:cantidad,

                    utilidad:importe-costo,

                    dia:dias[
                        fecha.getDay()
                    ]
                }

            }).filter(v=>v);

            cargarFiltros();

            render();

        }

    });

}

function cargarFiltros(){

    llenarSelect(
        "vendedorFilter",
        [...new Set(
            ventas.map(v=>v["COD VEND 1"])
        )]
    );

    llenarSelect(
        "clienteFilter",
        [...new Set(
            ventas.map(v=>v["NOMBRE CLIENTE"])
        )]
    );

    llenarSelect(
        "clasificacionFilter",
        [...new Set(
            ventas.map(v=>v["CLASIFICACION"])
        )]
    );
}

function llenarSelect(id,data){

    let select =
        document.getElementById(id);

    if(select.options.length > 1)
        return;

    data.sort().forEach(item=>{

        if(!item) return;

        let option =
            document.createElement("option");

        option.value = item;

        option.textContent = item;

        select.appendChild(option);

    });

}

document.querySelectorAll("select")
.forEach(el=>{

    el.addEventListener(
        "change",
        ()=>render()
    );

});

function render(fechaFiltro=null){

    let vendedor =
        document.getElementById(
            "vendedorFilter"
        ).value;

    let cliente =
        document.getElementById(
            "clienteFilter"
        ).value;

    let clasificacion =
        document.getElementById(
            "clasificacionFilter"
        ).value;

    let filtradas =
        ventas.filter(v=>{

        let ok = true;

        if(vendedor &&
            v["COD VEND 1"] != vendedor)
            ok = false;

        if(cliente &&
            v["NOMBRE CLIENTE"] != cliente)
            ok = false;

        if(clasificacion &&
            v["CLASIFICACION"] != clasificacion)
            ok = false;

        if(fechaFiltro){

            let fecha =
                formatearFecha(v.fechaObj);

            if(fecha != fechaFiltro)
                ok = false;
        }

        return ok;

    });

    actualizarKPIs(filtradas);

    actualizarTabla(filtradas);

    actualizarCalendario();
}

function actualizarKPIs(data){

    let facturacion =
        data.reduce(
            (a,b)=>a+b.IMPORTE,
            0
        );

    let costo =
        data.reduce(
            (a,b)=>a+b.COSTO,
            0
        );

    let utilidad =
        data.reduce(
            (a,b)=>a+b.utilidad,
            0
        );

    let cantidad =
        data.reduce(
            (a,b)=>a+b.CANTIDAD,
            0
        );

    let clientes =
        new Set(
            data.map(
                v=>v["NOMBRE CLIENTE"]
            )
        ).size;

    let margen =
        facturacion > 0
        ? ((utilidad/facturacion)*100)
        : 0;

    document.getElementById("facturacion")
    .textContent = money(facturacion);

    document.getElementById("costo")
    .textContent = money(costo);

    document.getElementById("utilidad")
    .textContent = money(utilidad);

    document.getElementById("cantidad")
    .textContent = cantidad;

    document.getElementById("clientes")
    .textContent = clientes;

    document.getElementById("margen")
    .textContent =
        margen.toFixed(1)+"%";
}

function actualizarTabla(data){

    let tbody =
        document.getElementById(
            "tablaVentas"
        );

    tbody.innerHTML = "";

    data.forEach(v=>{

        tbody.innerHTML += `

        <tr>

        <td>${formatearFecha(v.fechaObj)}</td>

        <td>${v.dia}</td>

        <td>${v["COD VEND 1"]}</td>

        <td>${v["NOMBRE CLIENTE"]}</td>

        <td>${v.DESCRIPCION}</td>

        <td>${v.CLASIFICACION}</td>

        <td>${v.CANTIDAD}</td>

        <td>${money(v.IMPORTE)}</td>

        <td>${money(v.COSTO)}</td>

        <td>${money(v.utilidad)}</td>

        </tr>

        `;

    });

}

function actualizarCalendario(){

    let calendar =
        document.getElementById(
            "calendar"
        );

    calendar.innerHTML = "";

    let year = 2026;

    let month = 4;

    let primerDia =
        new Date(year,month,1);

    let inicio =
        primerDia.getDay();

    if(inicio===0)
        inicio=7;

    for(let i=1;i<inicio;i++){

        let empty =
            document.createElement("div");

        empty.className =
            "day empty";

        calendar.appendChild(empty);

    }

    let totalDias =
        new Date(year,month+1,0)
        .getDate();

    for(let day=1;
        day<=totalDias;
        day++){

        let fechaTexto =
            String(day).padStart(2,'0')
            +"/05/2026";

        let ventasDia =
            ventas.filter(v=>{

            return(
                formatearFecha(
                    v.fechaObj
                ) == fechaTexto
            );

        });

        let facturacion =
            ventasDia.reduce(
                (a,b)=>a+b.IMPORTE,
                0
            );

        let utilidad =
            ventasDia.reduce(
                (a,b)=>a+b.utilidad,
                0
            );

        let cantidad =
            ventasDia.reduce(
                (a,b)=>a+b.CANTIDAD,
                0
            );

        let clientes =
            new Set(
                ventasDia.map(
                    v=>v["NOMBRE CLIENTE"]
                )
            ).size;

        let fechaReal =
            new Date(year,month,day);

        let color = "green";

        if(utilidad<5000)
            color="yellow";

        if(utilidad<1000)
            color="red";

        let div =
            document.createElement("div");

        div.className =
            `day ${color}`;

        div.innerHTML = `

        <div class="day-number">
        ${day}
        </div>

        <div class="day-name">
        ${dias[fechaReal.getDay()]}
        </div>

        <div class="day-data">
        Venta:
        <b>${money(facturacion)}</b>
        </div>

        <div class="day-data">
        Utilidad:
        <b>${money(utilidad)}</b>
        </div>

        <div class="day-data">
        Clientes:
        <b>${clientes}</b>
        </div>

        <div class="day-data">
        Artículos:
        <b>${cantidad}</b>
        </div>

        `;

        div.onclick = ()=>{

            render(fechaTexto);

        };

        calendar.appendChild(div);

    }

}

function formatearFecha(fecha){

    let dia =
        String(
            fecha.getDate()
        ).padStart(2,'0');

    let mes =
        String(
            fecha.getMonth()+1
        ).padStart(2,'0');

    let anio =
        fecha.getFullYear();

    return `${dia}/${mes}/${anio}`;
}

function money(valor){

    return valor.toLocaleString(
        'es-MX',
        {
            style:'currency',
            currency:'MXN'
        }
    );
}

cargarDatos();

setInterval(()=>{

    cargarDatos();

},30000);

</script>

</body>
</html>
