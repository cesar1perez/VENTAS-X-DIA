<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Comercial</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f6f9;
}

header{
    background:#1f2937;
    color:white;
    padding:20px;
    font-size:28px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.filters{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:20px;
}

select,input{
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:14px;
}

.kpis{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card h2{
    margin:0;
    font-size:18px;
    color:#555;
}

.card p{
    font-size:30px;
    margin-top:10px;
    font-weight:bold;
    color:#111827;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:16px;
    overflow:hidden;
}

th{
    background:#111827;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f9fafb;
}

.calendar{
    display:grid;
    grid-template-columns: repeat(7,1fr);
    gap:10px;
    margin-top:30px;
}

.day{
    background:white;
    border-radius:12px;
    padding:10px;
    min-height:120px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.day strong{
    display:block;
    margin-bottom:8px;
}

.green{
    border-left:6px solid #10b981;
}

.yellow{
    border-left:6px solid #f59e0b;
}

.red{
    border-left:6px solid #ef4444;
}

canvas{
    background:white;
    border-radius:16px;
    padding:20px;
    margin-top:20px;
}
</style>
</head>
<body>

<header>
Dashboard Comercial de Ventas
</header>

<div class="container">

<div class="filters">
    <select id="vendedorFilter">
        <option value="">Todos los vendedores</option>
    </select>

    <select id="clienteFilter">
        <option value="">Todos los clientes</option>
    </select>

    <select id="clasificacionFilter">
        <option value="">Todas las clasificaciones</option>
    </select>

    <input type="date" id="fechaFilter">
</div>

<div class="kpis">
    <div class="card">
        <h2>Facturación</h2>
        <p id="facturacion">$0</p>
    </div>

    <div class="card">
        <h2>Costo</h2>
        <p id="costo">$0</p>
    </div>

    <div class="card">
        <h2>Utilidad</h2>
        <p id="utilidad">$0</p>
    </div>

    <div class="card">
        <h2>Artículos Vendidos</h2>
        <p id="cantidad">0</p>
    </div>
</div>

<canvas id="ventasChart"></canvas>

<h2>Detalle de Ventas</h2>

<table>
<thead>
<tr>
<th>Fecha</th>
<th>Día</th>
<th>Vendedor</th>
<th>Cliente</th>
<th>Artículo</th>
<th>Clasificación</th>
<th>Cantidad</th>
<th>Importe</th>
<th>Costo</th>
<th>Utilidad</th>
</tr>
</thead>

<tbody id="tablaVentas"></tbody>
</table>

<h2>Calendario Mensual</h2>
<div class="calendar" id="calendar"></div>

</div>

<script>

const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRDY9ek9N_ePgcaLznpzxUj8aZfJvWsbmjDMdC972iN8OVsxIz-cNLM0rpmLPyD2OztamjBYoZKSUUf/pub?output=csv";

let ventas = [];

const diasSemana = [
'Domingo',
'Lunes',
'Martes',
'Miércoles',
'Jueves',
'Viernes',
'Sábado'
];

Papa.parse(csvUrl,{
    download:true,
    header:true,
    complete:function(results){

        ventas = results.data.map(v => {

            let fecha = convertirFecha(v.FECHA);

            return {
                ...v,
                IMPORTE: parseFloat(v.IMPORTE)||0,
                COSTO: parseFloat(v.COSTO)||0,
                CANTIDAD: parseFloat(v.CANTIDAD)||0,
                utilidad:(parseFloat(v.IMPORTE)||0)-(parseFloat(v.COSTO)||0),
                fechaObj:fecha,
                dia:diasSemana[fecha.getDay()]
            }
        });

        cargarFiltros();
        render();
    }
});

function convertirFecha(fechaStr){

    let partes = fechaStr.split('/');

    return new Date(
        partes[2],
        partes[1]-1,
        partes[0]
    );
}

function cargarFiltros(){

    cargarSelect(
        "vendedorFilter",
        [...new Set(ventas.map(v=>v["COD VEND 1"]))]
    );

    cargarSelect(
        "clienteFilter",
        [...new Set(ventas.map(v=>v["NOMBRE CLIENTE"]))]
    );

    cargarSelect(
        "clasificacionFilter",
        [...new Set(ventas.map(v=>v["CLASIFICACION"]))]
    );
}

function cargarSelect(id,data){

    const select=document.getElementById(id);

    data.sort().forEach(item=>{

        if(!item)return;

        const option=document.createElement("option");

        option.value=item;
        option.textContent=item;

        select.appendChild(option);
    });
}

document.querySelectorAll("select,input").forEach(el=>{
    el.addEventListener("change",render);
});

function render(){

    let vendedor=document.getElementById("vendedorFilter").value;
    let cliente=document.getElementById("clienteFilter").value;
    let clasificacion=document.getElementById("clasificacionFilter").value;
    let fecha=document.getElementById("fechaFilter").value;

    let filtradas=ventas.filter(v=>{

        let ok=true;

        if(vendedor && v["COD VEND 1"]!=vendedor) ok=false;
        if(cliente && v["NOMBRE CLIENTE"]!=cliente) ok=false;
        if(clasificacion && v["CLASIFICACION"]!=clasificacion) ok=false;

        if(fecha){

            let f=v.fechaObj.toISOString().split('T')[0];

            if(f!=fecha) ok=false;
        }

        return ok;
    });

    actualizarKPIs(filtradas);
    actualizarTabla(filtradas);
    actualizarGrafica(filtradas);
    actualizarCalendario(filtradas);
}

function actualizarKPIs(data){

    let facturacion=data.reduce((a,b)=>a+b.IMPORTE,0);
    let costo=data.reduce((a,b)=>a+b.COSTO,0);
    let utilidad=data.reduce((a,b)=>a+b.utilidad,0);
    let cantidad=data.reduce((a,b)=>a+b.CANTIDAD,0);

    document.getElementById("facturacion").textContent =
        money(facturacion);

    document.getElementById("costo").textContent =
        money(costo);

    document.getElementById("utilidad").textContent =
        money(utilidad);

    document.getElementById("cantidad").textContent =
        cantidad.toFixed(0);
}

function actualizarTabla(data){

    let tbody=document.getElementById("tablaVentas");

    tbody.innerHTML="";

    data.forEach(v=>{

        tbody.innerHTML+=`
        <tr>
            <td>${formatearFecha(v.fechaObj)}</td>
            <td>${v.dia}</td>
            <td>${v["COD VEND 1"]}</td>
            <td>${v["NOMBRE CLIENTE"]}</td>
            <td>${v.DESCRIPCION}</td>
            <td>${v.CLASIFICACION}</td>
            <td>${v.CANTIDAD}</td>
            <td>${money(v.IMPORTE)}</td>
            <td>${money(v.COSTO)}</td>
            <td>${money(v.utilidad)}</td>
        </tr>
        `;
    });
}

let chart;

function actualizarGrafica(data){

    let agrupado={};

    data.forEach(v=>{

        let fecha=formatearFecha(v.fechaObj);

        if(!agrupado[fecha])
            agrupado[fecha]=0;

        agrupado[fecha]+=v.IMPORTE;
    });

    let labels=Object.keys(agrupado);
    let valores=Object.values(agrupado);

    if(chart) chart.destroy();

    chart=new Chart(
        document.getElementById("ventasChart"),
        {
            type:'bar',
            data:{
                labels:labels,
                datasets:[{
                    label:'Ventas',
                    data:valores
                }]
            }
        }
    );
}

function actualizarCalendario(data){

    let calendar=document.getElementById("calendar");

    calendar.innerHTML="";

    let agrupado={};

    data.forEach(v=>{

        let fecha=formatearFecha(v.fechaObj);

        if(!agrupado[fecha]){

            agrupado[fecha]={
                importe:0,
                utilidad:0,
                cantidad:0,
                clientes:new Set()
            }
        }

        agrupado[fecha].importe+=v.IMPORTE;
        agrupado[fecha].utilidad+=v.utilidad;
        agrupado[fecha].cantidad+=v.CANTIDAD;
        agrupado[fecha].clientes.add(v["NOMBRE CLIENTE"]);
    });

    Object.keys(agrupado).forEach(fecha=>{

        let d=agrupado[fecha];

        let color='green';

        if(d.utilidad<3000) color='yellow';
        if(d.utilidad<1000) color='red';

        calendar.innerHTML+=`
        <div class="day ${color}">
            <strong>${fecha}</strong>
            <div>Facturación: ${money(d.importe)}</div>
            <div>Utilidad: ${money(d.utilidad)}</div>
            <div>Piezas: ${d.cantidad}</div>
            <div>Clientes: ${d.clientes.size}</div>
        </div>
        `;
    });
}

function money(n){

    return n.toLocaleString('es-MX',{
        style:'currency',
        currency:'MXN'
    });
}

function formatearFecha(fecha){

    return fecha.toLocaleDateString('es-MX');
}

</script>

</body>
</html>
